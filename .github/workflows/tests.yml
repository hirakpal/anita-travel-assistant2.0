name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pytest
          # Note: sentence-transformers / pinecone-client are intentionally
          # NOT installed here - the test suite runs entirely in Demo mode,
          # and rag/*.py lazily imports those heavy deps only for Online
          # mode, so CI stays fast and has zero external dependencies.

      - name: Run test suite
        run: pytest tests/ -v

      - name: Syntax-check the full project
        run: python -m py_compile $(find . -name "*.py" -not -path "./.git/*" -not -path "*/__pycache__/*")
